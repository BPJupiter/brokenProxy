# --- General Layout ---
newlines                        = lf        # Use Unix-style line endings
input_tab_size                  = 4
output_tab_size                 = 4
indent_columns                  = 4
indent_with_tabs                = 0         # Use spaces only
code_width                      = 256       # Column limit

# --- Braces (Allman Style) ---
# Force braces onto their own lines for every major control structure
nl_if_brace                     = force     # if () \n {
nl_else_brace                   = force     # else \n {
nl_for_brace                    = force     # for () \n {
nl_while_brace                  = force     # while () \n {
nl_do_brace                     = force     # do \n {
nl_switch_brace                 = force     # switch () \n {
nl_fdef_brace                   = force     # void func() \n {
nl_class_brace                  = force     # class X \n {
nl_struct_brace                 = force     # struct S \n {
nl_union_brace                  = force     # union U \n {
nl_enum_brace                   = force     # enum E \n {
nl_namespace_brace              = force     # namespace N \n {

# --- Pointers (Right Aligned: int *p) ---
sp_before_ptr_star              = force     # Space before *
sp_after_ptr_star               = remove    # No space after * (unless name is missing)
sp_between_ptr_star             = remove    # Handle **p correctly

# --- One-Liners (Allow Short Ifs) ---
nl_if_leave_one_liners          = true      # Don't break if (a) b;
nl_while_leave_one_liners       = true      # Don't break while (a) b;
nl_create_if_one_liner          = false     # Don't force them onto one line either

# --- Switch/Case ---
indent_switch_case              = 4         # Indent 'case' from 'switch'
indent_switch_break_with_case   = true      # Indent code in case, but not 'break'

# --- Binary Operators ---
# Break long lines BEFORE the operator
nl_before_binary_operator       = true

# --- Alignment & Spacing ---
sp_after_semi_for               = force     # Space after ; in for loops
sp_arith                        = force     # Space around + - / *
sp_bool                         = force     # Space around && ||
sp_compare                      = force     # Space around == != < >
sp_inside_paren                 = remove    # (x) instead of ( x )
sp_after_type                   = force     # Ensure space after type in declarations
