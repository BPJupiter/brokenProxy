<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Broken Proxy Settings</title>

        <link rel="stylesheet" type="text/css" href="./style.css">
        <script type="text/javascript" src="./script.js" defer></script>
    </head>

    <body>
        <header>
            <h1>Broken Proxy Settings</h1>
            <aside>Frances Telfar : University of Auckland</aside>
        </header>
        <hr>
        <div class="container">
            <div class="sidebar">
                <div class="settings-group">
                    <label for="maxLatency">Max latency (ms):</label>
                    <input type="number" id="maxLatency" name="maxLatency" min="1" max="9999.0", placeholder="e.g. 100">

                    <div class="sliders">
                        <div class="slider-control">
                            <span class="label-text">Enable Ping</span>
                            <label class="switch">
                                <input type="checkbox" id="pingEnabled">
                                <span class="slider" id="pingSlider"></span>
                            </label>
                        </div>
                        <div class="slider-control">
                            <span class="label-text">Enable Traceroute</span>
                            <label class="switch">
                                <input type="checkbox" id="trEnabled">
                                <span class="slider" id="trSlider"></span>
                            </label>
                        </div>
                        <div class="slider-control">
                            <span class="label-text">Local DNS Resolution</span>
                            <label class="switch">
                                <input type="checkbox" id="locDNSEnabled">
                                <span class="slider" id="locDNSSlider"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="button" id="confirmSettings">Confirm</button>
            </div>

            <main class="main element">
                <p><em>Main map placeholder...</em></en></p>
            </main>
        </div>
    </body>
</html>
